
<html>
<head>
<title>Image Gallery</title>

<style>
body{
    text-align:center;
    font-family:Arial;
    background-color:#f2f2f2;
}

h2{
    margin-top:30px;
    color:#c12c2c;
}

.gallery-box{
    margin-top:50px;
}

img{
    width:420px;
    height:320px;
    border-radius:18px;
    margin:0 40px;
}

button{
    padding:12px 20px;
    font-size:18px;
    border:none;
    background-color:#2fe058;
    color:rgb(249, 226, 226);
    border-radius:7px;
    cursor:pointer;
}

button:hover{
    background-color:#0d3216;
}
</style>

</head>

<body>

<h2>Interactive Image Gallery</h2>

<div class="gallery-box">
    <button onclick="prevImage()">Previous</button>

    <img id="galleryImage" src="images/img1.jpg">

    <button onclick="nextImage()">Next</button>
</div>

<script>
let images = [
    "pic4.jpeg",
    "pic1.jpeg",
    "pic2.jpeg",
    "pic3.jpeg",
    "pic5.jpeg"
];

let index = 0;

function showImage(){
    document.getElementById("galleryImage").src = images[index];
}

function nextImage(){
    index++;
    if(index >= images.length){
        index = 0;
    }
    showImage();
}

function prevImage(){
    index--;
    if(index < 0){
        index = images.length - 1;
    }
    showImage();
}
</script>

</body>
</html>
